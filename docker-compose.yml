services:
  postgres:
    container_name: effect-monorepo-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: effect-monorepo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jaeger-network
    restart: unless-stopped

  flyway:
    image: flyway/flyway:10
    command:
      - -url=jdbc:postgresql://postgres:5432/effect-monorepo
      - -user=postgres
      - -password=postgres
      - -connectRetries=10
      - migrate
    volumes:
      - ./packages/database/migrations:/flyway/sql
    depends_on:
      - postgres
    networks:
      - jaeger-network
    profiles:
      - migrate

  flyway-test:
    image: flyway/flyway:10
    command:
      - -url=jdbc:postgresql://postgres:5432/effect-monorepo-test
      - -user=postgres
      - -password=postgres
      - -connectRetries=10
      - migrate
    volumes:
      - ./packages/database/migrations:/flyway/sql
    depends_on:
      - postgres
    networks:
      - jaeger-network
    profiles:
      - migrate-test

  zitadel-db:
    container_name: effect-monorepo-zitadel-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zitadel
    volumes:
      - zitadel_db_data:/var/lib/postgresql/data
    networks:
      - jaeger-network
    restart: unless-stopped

  zitadel:
    container_name: effect-monorepo-zitadel
    # Pinned for reproducibility; bump after checking https://github.com/zitadel/zitadel/releases
    image: ghcr.io/zitadel/zitadel:v2.71.0
    command: 'start-from-init --masterkey "${ZITADEL_MASTERKEY:-MasterkeyNeedsToHave32Characters}" --tlsMode disabled --config /etc/zitadel/zitadel.yaml'
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: ${ZITADEL_ADMIN_EMAIL:-admin@example.com}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:-ChangeMe!1}
    ports:
      - "8080:8080"
    volumes:
      - ./infra/zitadel/zitadel.yaml:/etc/zitadel/zitadel.yaml:ro
    depends_on:
      - zitadel-db
    networks:
      - jaeger-network
    restart: unless-stopped

  seed-zitadel:
    image: node:22-alpine
    working_dir: /seed
    volumes:
      - ./infra/zitadel:/seed
    # Installs `pg` into a sibling node_modules on first run; subsequent runs are fast.
    command: ["sh", "-c", "npm install --silent --no-audit --no-fund && node seed.mjs"]
    # Share Zitadel's network namespace so `localhost:8080` inside this
    # container reaches Zitadel. Required because Zitadel keys instances by
    # the inbound Host header and the default instance is registered for
    # `localhost`. We can still reach other services on jaeger-network
    # (postgres, etc.) because zitadel itself is on that network.
    network_mode: "service:zitadel"
    environment:
      ZITADEL_ISSUER: http://localhost:8080
      ZITADEL_BOOTSTRAP_PAT: ${ZITADEL_BOOTSTRAP_PAT:-}
      ZITADEL_ADMIN_EMAIL: ${ZITADEL_ADMIN_EMAIL:-admin@example.com}
      APP_REDIRECT_URI: ${ZITADEL_REDIRECT_URI:-http://localhost:3000/auth/callback}
      APP_POST_LOGOUT_REDIRECT_URI: ${ZITADEL_POST_LOGOUT_REDIRECT_URI:-http://localhost:5173/}
      APP_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/effect-monorepo
    depends_on:
      - zitadel
      - postgres
    profiles:
      - seed-zitadel

  jaeger:
    container_name: effect-monorepo-jaeger
    image: jaegertracing/all-in-one:latest
    command:
      - "--collector.otlp.http.cors.allowed-headers=*"
      - "--collector.otlp.http.tls.enabled=false"
    ports:
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "9411:9411"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - QUERY_BASE_PATH=/
    networks:
      - jaeger-network
    restart: unless-stopped

networks:
  jaeger-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  zitadel_db_data:
    driver: local
