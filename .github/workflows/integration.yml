name: Integration tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  server-integration:
    name: Server integration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: effect-monorepo-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/effect-monorepo-test

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Run server integration tests
        run: pnpm -F @org/server test --run integration.test
