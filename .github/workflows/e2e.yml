name: E2E

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  acceptance:
    name: Playwright acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/effect-monorepo-test

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm -F @org/acceptance exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm -F @org/acceptance exec playwright install-deps chromium

      - name: Prepare Zitadel bind-mount
        run: |
          # The Zitadel container runs as a non-root UID and writes its
          # bootstrap PAT to /machinekey on first boot. The bind-mount target
          # has to be writable for that UID, otherwise FirstInstance fails
          # with "permission denied" and the volume gets stuck in a
          # half-initialized state.
          mkdir -p ./infra/zitadel/.machinekey
          chmod 0777 ./infra/zitadel/.machinekey

      - name: Bring up Postgres + create test DB
        run: |
          set -euo pipefail
          # Postgres comes up via compose so the init script in
          # infra/postgres/init/ runs and creates the `zitadel` database
          # alongside the app DB.
          docker compose up -d --wait postgres
          docker compose exec -T postgres psql -U postgres -c \
            'CREATE DATABASE "effect-monorepo-test"'

      - name: Apply database migrations
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          for f in packages/database/migrations/V*.sql; do
            echo "Applying $f"
            psql -v ON_ERROR_STOP=1 -h localhost -U postgres -d effect-monorepo-test -f "$f"
          done

      - name: Bootstrap Zitadel + .env
        env:
          # The seed inserts the admin row into the app DB. In CI that's the
          # test DB created above; locally it's `effect-monorepo`.
          SEED_APP_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/effect-monorepo-test
        run: pnpm bootstrap

      - name: Run acceptance tests
        run: pnpm test:acceptance
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: packages/acceptance/playwright-report/
          retention-days: 14

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs postgres zitadel || true
